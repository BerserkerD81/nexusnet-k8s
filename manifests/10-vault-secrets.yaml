###############################################################################
# CAPA DE SEGURIDAD MULTINIVEL — HashiCorp Vault (Secrets Manager)
#
# Objetivo académico:
#   • Seguridad multinivel: reemplaza Secrets de Kubernetes en texto plano
#   • Cifrado en reposo de credenciales (JWT, OAuth, DB passwords)
#   • Audit trail de acceso a secretos
#   • Rotación automática de credenciales
#
# Integración con el sistema existente:
#   • El backend (05-backend.yaml) inyecta secretos via Vault Agent Sidecar
#   • Sustituye los nexusnet-jwt-secrets, nexusnet-oauth-secrets del 04-secrets.yaml
###############################################################################

apiVersion: v1
kind: Namespace
metadata:
  name: vault
  labels:
    name: vault

---
# ── ServiceAccount para Vault ─────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault
  namespace: vault
  labels:
    app: vault

---
# ── RBAC: Vault necesita gestionar tokens de Kubernetes ──────────────────────
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vault-server-binding
  labels:
    app: vault
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator
subjects:
  - kind: ServiceAccount
    name: vault
    namespace: vault

---
# ── ConfigMap: configuración de Vault ────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-config
  namespace: vault
  labels:
    app: vault
data:
  vault.hcl: |
    ui = true
    log_level = "info"

    # Backend de almacenamiento — Raft integrado (HA sin dependencias externas)
    storage "raft" {
      path    = "/vault/data"
      node_id = "vault-0"

      # Replicación Raft para HA (3 nodos en producción)
      retry_join {
        leader_api_addr = "http://vault-0.vault-internal:8200"
      }
    }

    # Listener HTTP interno (TLS termina en Traefik en local)
    listener "tcp" {
      address       = "0.0.0.0:8200"
      tls_disable   = "true"   # En prod: tls_cert_file + tls_key_file
    }

    # API address para cluster HA
    api_addr     = "http://vault.vault.svc.cluster.local:8200"
    cluster_addr = "http://vault-0.vault-internal:8201"

    # Telemetría para Prometheus
    telemetry {
      prometheus_retention_time = "30s"
      disable_hostname = true
    }

---
# ── StatefulSet: Vault server ─────────────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: vault
  namespace: vault
  labels:
    app: vault
spec:
  serviceName: vault-internal
  replicas: 1   # Para k3d local; en producción: 3 (quorum Raft)
  selector:
    matchLabels:
      app: vault
  template:
    metadata:
      labels:
        app: vault
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/v1/sys/metrics"
        prometheus.io/port: "8200"
    spec:
      serviceAccountName: vault
      # Evitar colocar Vault y el backend en el mismo nodo
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: [vault]
                topologyKey: kubernetes.io/hostname
      containers:
        - name: vault
          image: hashicorp/vault:1.17
          args: ["server", "-dev"]
          env:
            - name: VAULT_DEV_ROOT_TOKEN_ID
              value: "nexusnet-dev-root-token"
            - name: VAULT_DEV_LISTEN_ADDRESS
              value: "0.0.0.0:8200"
            - name: VAULT_ADDR
              value: "http://127.0.0.1:8200"
          ports:
            - containerPort: 8200
              name: vault-port
          volumeMounts:
            - name: vault-data
              mountPath: /vault/data
          livenessProbe:
            httpGet:
              path: /v1/sys/health?standbyok=true
              port: 8200
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /v1/sys/health?standbyok=true
              port: 8200
            initialDelaySeconds: 10
            periodSeconds: 5
          securityContext:
            capabilities:
              add: ["IPC_LOCK"]   # Vault necesita mlock() para evitar swap de secretos
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: vault-data
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: vault-data
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: local-path
        resources:
          requests:
            storage: 1Gi

---
# ── Servicio interno (Raft cluster communication) ─────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: vault-internal
  namespace: vault
  labels:
    app: vault
spec:
  clusterIP: None   # Headless para DNS por pod
  ports:
    - port: 8200
      name: vault
  selector:
    app: vault

---
# ── Servicio externo (UI y API) ───────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: vault
  namespace: vault
  labels:
    app: vault
spec:
  type: ClusterIP
  ports:
    - port: 8200
      targetPort: 8200
      name: vault
  selector:
    app: vault

---
# ── NetworkPolicy: Vault solo accesible desde el backend y namespace vault ────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: vault-network-policy
  namespace: vault
  labels:
    app: vault
spec:
  podSelector:
    matchLabels:
      app: vault
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Solo el backend puede consultar secretos
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: default
          podSelector:
            matchLabels:
              app: nexusnet-api
      ports:
        - port: 8200
    # Comunicación intra-cluster Raft
    - from:
        - podSelector:
            matchLabels:
              app: vault
      ports:
        - port: 8200
        - port: 8201
  egress:
    - {}   # Vault puede hablar hacia afuera (KMS, LDAP, etc.)

---
# ── Job: inicialización de secretos en Vault (idempotente) ────────────────────
# Este Job se ejecuta una vez para poblar los secretos desde los K8s Secrets
# existentes hacia Vault KV.
apiVersion: batch/v1
kind: Job
metadata:
  name: vault-init-secrets
  namespace: vault
  labels:
    app: vault-init
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: vault-init
          image: hashicorp/vault:1.17
          env:
            - name: VAULT_ADDR
              value: "http://vault.vault.svc.cluster.local:8200"
            - name: VAULT_TOKEN
              value: "nexusnet-dev-root-token"
          command:
            - sh
            - -c
            - |
              set -e
              echo "Esperando Vault..."
              until vault status; do sleep 2; done

              # Habilitar motor KV v2
              vault secrets enable -version=2 kv 2>/dev/null || true

              # Habilitar autenticación Kubernetes
              vault auth enable kubernetes 2>/dev/null || true
              vault write auth/kubernetes/config \
                kubernetes_host="https://kubernetes.default.svc.cluster.local"

              # Política para el backend
              vault policy write nexusnet-backend - <<'EOF'
              path "kv/data/nexusnet/*" {
                capabilities = ["read"]
              }
              EOF

              # Rol Kubernetes → Vault
              vault write auth/kubernetes/role/nexusnet-backend \
                bound_service_account_names=nexusnet-api \
                bound_service_account_namespaces=default \
                policies=nexusnet-backend \
                ttl=1h

              # Escribir secretos (en prod estos vienen de un pipeline CI/CD encriptado)
              vault kv put kv/nexusnet/jwt \
                JWT_SECRET="dev_local_jwt_secret_nexusnet_2024" \
                JWT_REFRESH_SECRET="dev_local_jwt_refresh_nexusnet_2024"

              vault kv put kv/nexusnet/oauth \
                GITHUB_CLIENT_ID="__GITHUB_CLIENT_ID__" \
                GITHUB_CLIENT_SECRET="__GITHUB_CLIENT_SECRET__" \
                GOOGLE_CLIENT_ID="__GOOGLE_CLIENT_ID__" \
                GOOGLE_CLIENT_SECRET="__GOOGLE_CLIENT_SECRET__"

              vault kv put kv/nexusnet/db \
                DATABASE_URL="postgresql://postgres:postgres@postgres:5432/nexusnet?schema=public" \
                DATABASE_REPLICA_URL="postgresql://postgres:postgres@postgres-replica:5432/nexusnet?schema=public" \
                REDIS_PASSWORD="redis_nexusnet_2024"

              echo "✅ Vault inicializado correctamente"

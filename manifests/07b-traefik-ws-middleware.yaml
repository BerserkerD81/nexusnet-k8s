###############################################################################
# Traefik Middleware — WebSocket Headers
#
# Este recurso CRD le dice a Traefik que propague los headers necesarios
# para el upgrade HTTP → WebSocket (Connection: Upgrade, Upgrade: websocket).
#
# Sin esto, Traefik actúa como proxy HTTP puro y el handshake de Socket.IO
# falla: el cliente queda atascado en long-polling o recibe 400/502.
#
# Aplicar ANTES del ingress:
#   kubectl apply -f 07b-traefik-ws-middleware.yaml
#   kubectl apply -f 07-ingress.yaml
###############################################################################

apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: ws-headers
  namespace: default
spec:
  headers:
    customRequestHeaders:
      Connection: "keep-alive, Upgrade"
      Upgrade: "websocket"
    customResponseHeaders:
      Connection: "keep-alive, Upgrade"

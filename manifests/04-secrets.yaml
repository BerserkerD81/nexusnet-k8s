###############################################################################
# NexusNet — Secrets & ConfigMap
###############################################################################

# ── JWT Secrets ────────────────────────────────────────────────────────────────
# Values are base64-encoded. For local dev only — change in production.
# echo -n "your_secret" | base64
apiVersion: v1
kind: Secret
metadata:
  name: nexusnet-jwt-secrets
  labels:
    app: nexusnet
type: Opaque
stringData:
  JWT_SECRET: "dev_local_jwt_secret_nexusnet_2024"
  JWT_REFRESH_SECRET: "dev_local_jwt_refresh_nexusnet_2024"

---
# ── App ConfigMap ──────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: nexusnet-config
  labels:
    app: nexusnet
data:
  NODE_ENV: "development"
  PORT: "3000"
  # PostgreSQL primary (escrituras) y réplicas (lecturas)
  DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/nexusnet?schema=public"
  DATABASE_REPLICA_URL: "postgresql://postgres:postgres@postgres-replica:5432/nexusnet?schema=public"
  # Redis local para desarrollo: el backend usa este URL directo.
  REDIS_URL: "redis://:redis_nexusnet_2024@redis:6379"
  FRONTEND_URL: "__FRONTEND_URL__"
  OAUTH_CALLBACK_BASE_URL: "__OAUTH_CALLBACK_BASE_URL__"
  LOG_LEVEL: "info"

---
# ── Redis Password Secret (para el backend) ────────────────────────────────────
# Debe coincidir con el valor en redis-secret (03-redis.yaml)
apiVersion: v1
kind: Secret
metadata:
  name: nexusnet-redis-secret
  labels:
    app: nexusnet
type: Opaque
stringData:
  REDIS_PASSWORD: "redis_nexusnet_2024"

---
# ── OAuth Secrets (Google/GitHub) ─────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: nexusnet-oauth-secrets
  labels:
    app: nexusnet
type: Opaque
stringData:
  GITHUB_CLIENT_ID: "__GITHUB_CLIENT_ID__"
  GITHUB_CLIENT_SECRET: "__GITHUB_CLIENT_SECRET__"
  GOOGLE_CLIENT_ID: "__GOOGLE_CLIENT_ID__"
  GOOGLE_CLIENT_SECRET: "__GOOGLE_CLIENT_SECRET__"

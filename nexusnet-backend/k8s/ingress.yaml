apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nexusnet-ingress
  namespace: nexusnet
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: 10m
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  tls:
    - hosts:
        - nexusnet.example.com
      secretName: nexusnet-tls
  rules:
    - host: nexusnet.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-service
                port:
                  number: 80
          - path: /socket.io
            pathType: Prefix
            backend:
              service:
                name: api-service
                port:
                  number: 80

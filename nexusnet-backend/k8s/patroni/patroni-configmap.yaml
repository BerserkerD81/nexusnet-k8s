apiVersion: v1
kind: ConfigMap
metadata:
  name: patroni-config
data:
  patroni.yml: |
    scope: nexus
    namespace: /db/
    ttl: 30
    loop_wait: 10
    retry_timeout: 10
    restapi:
      listen: 0.0.0.0:8008
      connect_address: '{{ POD_IP }}:8008'
    etcd:
      host: etcd:2379
    bootstrap:
      dcs:
        ttl: 30
        loop_wait: 10
        retry_timeout: 10
        postgresql:
          use_pg_rewind: true
          parameters:
            max_connections: '100'
            shared_buffers: '128MB'
      initdb:
        - encoding: UTF8
        - locale: en_US.UTF-8
      users:
        admin:
          password: admin
          options:
            - createrole
            - createdb
    postgresql:
      use_unix_socket: false
      listen: 0.0.0.0:5432
      connect_address: '{{ POD_IP }}:5432'
      data_dir: /home/postgres/pgdata
      bin_dir: /usr/lib/postgresql/15/bin
      parameters:
        unix_socket_directories: '/tmp'

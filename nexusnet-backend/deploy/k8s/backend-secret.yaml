apiVersion: v1
kind: Secret
metadata:
  name: nexusnet-jwt-secrets
type: Opaque
stringData:
  JWT_SECRET: "REPLACE_WITH_STRONG_VALUE"
  JWT_REFRESH_SECRET: "REPLACE_WITH_STRONG_VALUE"

# Recommended: don't store secrets in repo. Use Azure Key Vault + AKS pod identity
# To create this secret from the CLI instead of applying this file:
# kubectl create secret generic nexusnet-jwt-secrets --from-literal=JWT_SECRET="..." --from-literal=JWT_REFRESH_SECRET="..."

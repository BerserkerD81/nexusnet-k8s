apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nexusnet-api-ingress
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  tls:
    - hosts:
        - nexusnet.example.com
      # For AKS use a proper TLS secret or an ingress controller with cert-manager
      secretName: nexusnet-tls
  rules:
    - host: nexusnet.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nexusnet-api
                port:
                  number: 3000

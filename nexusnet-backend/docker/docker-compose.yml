services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.prod
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/nexusnet?schema=public
      REDIS_URL: redis://redis:6379
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3001:3000"
    networks:
      - frontend-net
      - backend-net
      - monitoring-net
    deploy:
      replicas: 1

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: nexusnet
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nexusnet"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend-net

  redis:
    image: redis:7
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend-net
      - monitoring-net

  nginx:
    image: nginx:1.27
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - frontend-net

  prometheus:
    image: prom/prometheus:v2.54.1
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - monitoring-net

  grafana:
    image: grafana/grafana:11.1.4
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - monitoring-net

  adminer:
    image: adminer:4.8.1
    profiles: ["dev"]
    ports:
      - "8081:8080"
    networks:
      - backend-net

networks:
  frontend-net:
  backend-net:
  monitoring-net:

volumes:
  postgres_data:
  redis_data:
  grafana_data:
